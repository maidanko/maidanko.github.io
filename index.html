<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
</head>
<body>
    <h3>Перенаправление на домашний сервер...</h3>

    <script>
        var url = "https://nonsymphonious-tran-aciform.ngrok-free.dev/";
        
        // Старый надежный способ создания запроса
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        
        // Передаем тот самый заголовок с любым значением (выбрали "true")
        xhr.setRequestHeader("ngrok-skip-browser-warning", "111");
        
        xhr.onreadystatechange = function() {
            // Как только запрос ушел и сервер ответил (неважно как), прыгаем на сайт
            if (xhr.readyState === 4) {
                window.location.href = url;
            }
        };
        xhr.send();
    </script>
</body>
</html>
